<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>萍姐火锅全国经营地图看板</title>
  <script src="assets/vendor/echarts.min.js"></script>
  <style>
    :root{
      --bg:#0d0c0a;--bg-soft:#15130f;--panel:#191711;--panel-2:#211e17;
      --line:#3b3325;--line-soft:#29251d;--ink:#f4ecdc;--muted:#9d9587;
      --gold:#d4a74d;--gold-bright:#f1d08a;--gold-dark:#74531c;--red:#b94636;
      --red-soft:#3a1d18;--radius:10px;
    }
    *{box-sizing:border-box}html,body{height:100%;margin:0}body{overflow:hidden;background:var(--bg);color:var(--ink);font-family:"Microsoft YaHei","PingFang SC",sans-serif}
    button{font:inherit}.app{height:100vh;display:flex;flex-direction:column;background:radial-gradient(900px 600px at 52% 42%,rgba(136,96,35,.08),transparent 72%),var(--bg)}
    .topbar{height:76px;flex:0 0 auto;display:flex;align-items:center;padding:0 22px;border-bottom:1px solid var(--line);background:rgba(13,12,10,.96);gap:24px}
    .brand{display:flex;align-items:center;gap:12px;min-width:360px}.seal{width:40px;height:40px;border:1px solid var(--gold);display:grid;place-items:center;color:var(--gold-bright);font-family:"STKaiti","KaiTi",serif;font-size:23px;transform:rotate(-2deg);box-shadow:inset 0 0 0 3px var(--bg),inset 0 0 0 4px rgba(212,167,77,.35)}
    .brand h1{margin:0;font-family:"Songti SC","SimSun",serif;font-size:20px;letter-spacing:2px;font-weight:700}.brand p{margin:4px 0 0;color:var(--muted);font:10px/1.2 "Bahnschrift",sans-serif;letter-spacing:1.8px}
    .top-meta{display:flex;align-items:center;gap:10px;margin-left:auto}.meta-block{border-left:1px solid var(--line);padding-left:12px}.meta-label{font-size:10px;color:var(--muted);letter-spacing:1px}.meta-value{font:600 13px/1.6 "Bahnschrift","Microsoft YaHei";color:var(--gold-bright)}
    .alert-chip,.data-chip{height:34px;padding:0 11px;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--muted);cursor:pointer;font-size:11px}.alert-chip b{color:var(--ink);font-weight:600}.alert-chip:hover,.data-chip:hover{border-color:var(--gold);color:var(--ink)}
    .dashboard{flex:1;min-height:0;display:grid;grid-template-columns:248px minmax(500px,1fr) 270px;grid-template-rows:1fr 1fr;grid-template-areas:"leftTop map rightTop" "leftBottom map rightBottom";gap:12px;padding:12px}
    .panel{min-height:0;min-width:0;background:linear-gradient(145deg,rgba(29,26,20,.98),rgba(20,18,14,.98));border:1px solid var(--line-soft);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.18);overflow:hidden}
    .panel-head{height:43px;display:flex;align-items:center;justify-content:space-between;padding:0 13px;border-bottom:1px solid var(--line-soft)}.panel-title{font-size:12px;font-weight:600;letter-spacing:.5px}.panel-note{font-size:10px;color:var(--muted)}
    .left-top{grid-area:leftTop;padding:13px}.left-bottom{grid-area:leftBottom}.right-top{grid-area:rightTop}.right-bottom{grid-area:rightBottom}.map-panel{grid-area:map;position:relative;display:flex;flex-direction:column}
    .eyebrow{font:10px/1 "Bahnschrift",sans-serif;color:var(--gold);letter-spacing:1.6px;margin-bottom:12px}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}.kpi{min-height:84px;border:1px solid var(--line-soft);background:rgba(255,255,255,.015);padding:12px;border-radius:8px;position:relative}.kpi.wide{grid-column:1/-1;min-height:92px;background:linear-gradient(100deg,rgba(212,167,77,.09),transparent)}
    .kpi-label{font-size:10px;color:var(--muted)}.kpi-value{margin-top:8px;font:700 22px/1 "Bahnschrift","Microsoft YaHei";color:var(--ink)}.kpi.wide .kpi-value{font-size:29px;color:var(--gold-bright)}.kpi-unit{font-size:10px;color:var(--muted);margin-left:4px}
    .rank-list{height:calc(100% - 43px);overflow:auto;padding:5px 10px 10px}.rank-row{display:grid;grid-template-columns:22px 1fr auto;gap:7px;align-items:center;padding:8px 2px;border-bottom:1px solid var(--line-soft)}.rank-no{font:700 11px "Bahnschrift";color:var(--muted)}.rank-row:nth-child(-n+3) .rank-no{color:var(--gold-bright)}.rank-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rank-sub{font-size:9px;color:var(--muted);margin-top:2px}.rank-value{font:600 11px "Bahnschrift";color:var(--gold-bright)}
    .chart{height:calc(100% - 43px);width:100%}.map-toolbar{height:48px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--line-soft);z-index:3}.crumb{font-size:11px;color:var(--muted);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.crumb b{color:var(--ink)}.map-actions{margin-left:auto;display:flex;gap:7px}.mode-btn,.back-btn{height:28px;border:1px solid var(--line);border-radius:6px;background:var(--panel-2);color:var(--muted);padding:0 9px;font-size:10px;cursor:pointer}.mode-btn.active{border-color:var(--gold);color:var(--gold-bright)}.mode-btn:disabled{opacity:.42;cursor:not-allowed}.back-btn{display:none;color:var(--ink)}
    #map{flex:1;min-height:0}.map-caption{position:absolute;left:14px;bottom:12px;z-index:3;background:rgba(13,12,10,.86);border:1px solid var(--line);border-radius:7px;padding:8px 10px;font-size:9px;color:var(--muted);backdrop-filter:blur(8px)}.map-caption b{color:var(--gold-bright)}
    .drawer-mask{position:fixed;inset:0;background:rgba(0,0,0,.36);z-index:20;display:none}.drawer-mask.show{display:block}.drawer{position:fixed;right:-440px;top:0;bottom:0;width:420px;z-index:21;background:#14120e;border-left:1px solid var(--line);box-shadow:-18px 0 45px rgba(0,0,0,.38);transition:right .24s ease;display:flex;flex-direction:column}.drawer.show{right:0}.drawer-head{height:70px;padding:0 18px;display:flex;align-items:center;border-bottom:1px solid var(--line)}.drawer-title{font:700 16px "Songti SC","SimSun",serif}.drawer-sub{font-size:10px;color:var(--muted);margin-top:4px}.drawer-close{margin-left:auto;width:32px;height:32px;border:1px solid var(--line);background:transparent;color:var(--ink);border-radius:7px;cursor:pointer}.drawer-body{padding:14px;overflow:auto}.notice{padding:12px;border:1px solid var(--line);border-radius:8px;background:var(--panel);margin-bottom:10px}.notice-title{font-size:11px;color:var(--gold-bright);font-weight:600}.notice p{margin:6px 0 0;font-size:10px;line-height:1.7;color:var(--muted)}.store-table{width:100%;border-collapse:collapse;font-size:10px}.store-table th,.store-table td{padding:9px 6px;text-align:left;border-bottom:1px solid var(--line-soft)}.store-table th{color:var(--muted);font-weight:500;position:sticky;top:0;background:#14120e}.store-table td:last-child{text-align:right;color:var(--gold-bright)}
    .city-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.city-metric{padding:10px;border:1px solid var(--line);border-radius:8px}.city-metric span{display:block;font-size:9px;color:var(--muted)}.city-metric b{display:block;margin-top:6px;font:600 14px "Bahnschrift";color:var(--ink)}
    .loading{position:fixed;inset:0;z-index:50;background:var(--bg);display:grid;place-items:center}.loading.hidden{display:none}.loader{text-align:center;color:var(--muted);font-size:11px}.loader-ring{width:34px;height:34px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .85s linear infinite;margin:0 auto 12px}@keyframes spin{to{transform:rotate(360deg)}}
    .error{color:#f0b0a7}.empty-chart{height:calc(100% - 43px);display:grid;place-items:center;text-align:center;padding:20px;color:var(--muted);font-size:11px;line-height:1.8}
    @media(max-width:1100px){body{overflow:auto}.app{height:auto;min-height:100vh}.topbar{height:auto;min-height:76px;flex-wrap:wrap;padding:12px}.brand{min-width:0}.top-meta{width:100%;margin-left:0;overflow:auto}.dashboard{display:flex;flex-direction:column;padding:10px}.left-top{order:1}.map-panel{order:2;height:520px}.right-top{order:3;height:260px}.right-bottom{order:4;height:300px}.left-bottom{order:5;height:380px}.drawer{width:min(92vw,420px)}.kpis{grid-template-columns:repeat(2,1fr)}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="loading" id="loading"><div class="loader"><div class="loader-ring"></div><div id="loadingText">正在整理全国经营数据…</div></div></div>
<div class="app">
  <header class="topbar">
    <div class="brand"><div class="seal">萍</div><div><h1>萍姐火锅全国经营地图看板</h1><p>NATIONAL OPERATIONS ATLAS</p></div></div>
    <div class="top-meta">
      <div class="meta-block"><div class="meta-label">数据截止日</div><div class="meta-value" id="dataDate">—</div></div>
      <button class="alert-chip" data-alert="return_rate">退菜预警 <b>未启用</b></button>
      <button class="alert-chip" data-alert="discount_dependency">高折扣依赖 <b>未启用</b></button>
      <button class="alert-chip" data-alert="revenue_decline">营收下跌 <b>未启用</b></button>
      <button class="data-chip" id="dataStatus">数据质量</button>
    </div>
  </header>
  <main class="dashboard">
    <section class="panel left-top">
      <div class="eyebrow">全国经营概览</div>
      <div class="kpis">
        <div class="kpi wide"><div class="kpi-label">全国昨日总营收 · 营业收入口径</div><div class="kpi-value" id="kpiRevenue">—</div></div>
        <div class="kpi"><div class="kpi-label">全国门店</div><div class="kpi-value" id="kpiStores">—</div></div>
        <div class="kpi"><div class="kpi-label">全国总客流</div><div class="kpi-value" id="kpiDiners">—</div></div>
      </div>
    </section>
    <section class="panel left-bottom"><div class="panel-head"><div class="panel-title">昨日营收 TOP10</div><div class="panel-note">营业收入</div></div><div class="rank-list" id="rankList"></div></section>
    <section class="panel map-panel">
      <div class="map-toolbar"><div class="crumb" id="crumb"><b>全国</b></div><div class="map-actions"><button class="back-btn" id="backBtn">返回全国</button><button class="mode-btn active">省级热力</button><button class="mode-btn" id="pointMode" disabled title="源表未提供门店坐标">门店圆点 · 待坐标</button></div></div>
      <div id="map"></div><div class="map-caption"><b>暖金深浅</b> = 昨日营业额　·　悬浮省份查看门店数　·　点击下钻城市</div>
    </section>
    <section class="panel right-top"><div class="panel-head"><div class="panel-title">近 7 日全国营收</div><div class="panel-note">营业收入</div></div><div id="trendChart" class="chart"></div></section>
    <section class="panel right-bottom"><div class="panel-head"><div class="panel-title">七大地理分区营收占比</div><div class="panel-note">营业收入</div></div><div id="regionChart" class="chart"></div></section>
  </main>
</div>
<div class="drawer-mask" id="drawerMask"></div><aside class="drawer" id="drawer"><div class="drawer-head"><div><div class="drawer-title" id="drawerTitle">详情</div><div class="drawer-sub" id="drawerSub"></div></div><button class="drawer-close" id="drawerClose">×</button></div><div class="drawer-body" id="drawerBody"></div></aside>
<script>
const AD_CODES={"北京市":"110000","天津市":"120000","河北省":"130000","山西省":"140000","内蒙古自治区":"150000","辽宁省":"210000","吉林省":"220000","黑龙江省":"230000","上海市":"310000","江苏省":"320000","浙江省":"330000","安徽省":"340000","福建省":"350000","江西省":"360000","山东省":"370000","河南省":"410000","湖北省":"420000","湖南省":"430000","广东省":"440000","广西壮族自治区":"450000","海南省":"460000","重庆市":"500000","四川省":"510000","贵州省":"520000","云南省":"530000","陕西省":"610000","甘肃省":"620000","宁夏回族自治区":"640000","新疆维吾尔自治区":"650000"};
const GOLD_SCALE=["#2c271e","#5f4820","#9a6c24","#cf9841","#f0cf87"];let DATA,mapChart,trendChart,regionChart,currentProvince=null;
const money=v=>new Intl.NumberFormat("zh-CN",{style:"currency",currency:"CNY",maximumFractionDigits:0}).format(v||0);const num=v=>new Intl.NumberFormat("zh-CN").format(v||0);const pct=v=>v==null?"暂无数据":(v*100).toFixed(1)+"%";
function openDrawer(title,sub,html){document.getElementById("drawerTitle").textContent=title;document.getElementById("drawerSub").textContent=sub||"";document.getElementById("drawerBody").innerHTML=html;document.getElementById("drawer").classList.add("show");document.getElementById("drawerMask").classList.add("show")}
function closeDrawer(){document.getElementById("drawer").classList.remove("show");document.getElementById("drawerMask").classList.remove("show")}
function renderKPIs(){document.getElementById("dataDate").textContent=DATA.meta.data_date;document.getElementById("kpiRevenue").innerHTML=money(DATA.nation.net_revenue);document.getElementById("kpiStores").innerHTML=num(DATA.nation.store_count)+'<span class="kpi-unit">家</span>';document.getElementById("kpiDiners").innerHTML=num(DATA.nation.diners)+'<span class="kpi-unit">人</span>'}
function renderRank(){document.getElementById("rankList").innerHTML=DATA.top10.map((s,i)=>`<div class="rank-row"><div class="rank-no">${String(i+1).padStart(2,"0")}</div><div><div class="rank-name">${s.store_name}</div><div class="rank-sub">${s.province} · ${s.city}</div></div><div class="rank-value">${money(s.net_revenue)}</div></div>`).join("")}
function renderTrend(){trendChart.setOption({animationDuration:700,grid:{left:50,right:16,top:24,bottom:32},tooltip:{trigger:"axis",backgroundColor:"#f7f0e2",borderColor:"#d4a74d",textStyle:{color:"#211e17"},valueFormatter:money},xAxis:{type:"category",data:DATA.trend.map(d=>d.date.slice(5)),boundaryGap:false,axisLine:{lineStyle:{color:"#4a4030"}},axisTick:{show:false},axisLabel:{color:"#8f877a",fontSize:10}},yAxis:{type:"value",splitLine:{lineStyle:{color:"#28241c"}},axisLabel:{color:"#8f877a",fontSize:9,formatter:v=>v>=10000?(v/10000).toFixed(0)+"万":v}},series:[{type:"line",data:DATA.trend.map(d=>d.net_revenue),smooth:.35,symbol:"circle",symbolSize:5,lineStyle:{color:"#d4a74d",width:2},itemStyle:{color:"#f1d08a"},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:"rgba(212,167,77,.28)"},{offset:1,color:"rgba(212,167,77,0)"}])}}]})}
function renderRegions(){regionChart.setOption({color:["#f0cf87","#d4a74d","#ae792d","#8c5b22","#6b4320","#4c321f","#32261e"],tooltip:{trigger:"item",backgroundColor:"#f7f0e2",borderColor:"#d4a74d",textStyle:{color:"#211e17"},formatter:p=>`${p.name}<br><b>${money(p.value)}</b> · ${p.percent}%`},legend:{bottom:8,left:"center",itemWidth:8,itemHeight:8,textStyle:{color:"#9d9587",fontSize:9}},series:[{type:"pie",radius:["48%","70%"],center:["50%","42%"],avoidLabelOverlap:true,label:{show:false},itemStyle:{borderColor:"#191711",borderWidth:2},data:DATA.regions.map(r=>({name:r.name,value:r.net_revenue}))}]})}
function nationalTooltip(p){const d=p.data;if(!d)return p.name;return `<div style="min-width:190px"><b>${d.name}</b><div style="margin-top:8px;line-height:1.9;color:#5b554c">门店总数　<b>${d.store_count} 家</b><br>昨日营业额　<b>${money(d.gross_revenue)}</b><br>昨日总营收　<b>${money(d.net_revenue)}</b><br>总客流　<b>${num(d.diners)} 人</b><br>总订单　<b>${num(d.orders)} 单</b><br>优惠占比　<b>${pct(d.discount_ratio)}</b></div></div>`}
async function renderNational(){currentProvince=null;document.getElementById("crumb").innerHTML="<b>全国</b>";document.getElementById("backBtn").style.display="none";const geo=await fetch("assets/maps/100000_full.json").then(r=>r.json());echarts.registerMap("china",geo);mapChart.off("click");mapChart.setOption({backgroundColor:"transparent",tooltip:{trigger:"item",backgroundColor:"#f7f0e2",borderColor:"#d4a74d",borderWidth:1,textStyle:{color:"#211e17"},extraCssText:"box-shadow:0 12px 34px rgba(0,0,0,.35);border-radius:8px",formatter:nationalTooltip},visualMap:{type:"continuous",min:Math.min(...DATA.provinces.map(p=>p.gross_revenue)),max:Math.max(...DATA.provinces.map(p=>p.gross_revenue)),left:16,bottom:48,text:["高","低"],calculable:true,inRange:{color:GOLD_SCALE},textStyle:{color:"#9d9587",fontSize:9},itemHeight:90,itemWidth:9},series:[{type:"map",map:"china",roam:true,zoom:1.12,data:DATA.provinces.map(p=>({...p,value:p.gross_revenue})),label:{show:false},itemStyle:{areaColor:"#242018",borderColor:"#716348",borderWidth:.65},emphasis:{label:{show:false},itemStyle:{areaColor:"#f1d08a"}}}]},true);mapChart.on("click",p=>{if(p.name&&AD_CODES[p.name])renderProvince(p.name)})}
async function renderProvince(province){currentProvince=province;const code=AD_CODES[province];document.getElementById("crumb").innerHTML=`<span>全国 / </span><b>${province}</b>`;document.getElementById("backBtn").style.display="inline-block";const geo=await fetch(`assets/maps/${code}_full.json`).then(r=>r.json());const mapName=`province-${code}`;echarts.registerMap(mapName,geo);const cities=DATA.cities.filter(c=>c.province===province);mapChart.off("click");mapChart.setOption({tooltip:{trigger:"item",backgroundColor:"#f7f0e2",borderColor:"#d4a74d",textStyle:{color:"#211e17"},formatter:p=>{const d=p.data;if(!d)return p.name;return `<b>${d.name}</b><div style="margin-top:7px;line-height:1.8;color:#5b554c">门店 ${d.store_count} 家<br>营业额 ${money(d.gross_revenue)}<br>总营收 ${money(d.net_revenue)}<br>客流 ${num(d.diners)} 人</div>`}},visualMap:{type:"continuous",min:Math.min(...cities.map(c=>c.gross_revenue)),max:Math.max(...cities.map(c=>c.gross_revenue)),left:16,bottom:48,text:["高","低"],calculable:true,inRange:{color:GOLD_SCALE},textStyle:{color:"#9d9587",fontSize:9},itemHeight:90,itemWidth:9},series:[{type:"map",map:mapName,roam:true,zoom:1.05,data:cities.map(c=>({...c,value:c.gross_revenue})),itemStyle:{areaColor:"#242018",borderColor:"#716348",borderWidth:.7},emphasis:{label:{show:true,color:"#1a1711",fontSize:10},itemStyle:{areaColor:"#f1d08a"}},label:{show:false}}]},true);mapChart.on("click",p=>{const city=cities.find(c=>c.name===p.name);if(city)showCity(city)})}
function showCity(city){const stores=DATA.stores.filter(s=>s.province===city.province&&s.city===city.name).sort((a,b)=>b.net_revenue-a.net_revenue);const modules=Object.values(DATA.city_modules);openDrawer(city.name,`${city.province} · ${DATA.meta.data_date}`,`<div class="city-summary"><div class="city-metric"><span>门店数</span><b>${city.store_count} 家</b></div><div class="city-metric"><span>总营收</span><b>${money(city.net_revenue)}</b></div><div class="city-metric"><span>总客流</span><b>${num(city.diners)} 人</b></div></div>${modules.map((m,i)=>`<div class="notice"><div class="notice-title">${["菜品大类营收占比","城市销量 TOP5","门店退菜率排名"][i]} · 待接入</div><p>${m.reason}</p></div>`).join("")}<table class="store-table"><thead><tr><th>门店</th><th>订单</th><th>客流</th><th>营收</th></tr></thead><tbody>${stores.map(s=>`<tr><td>${s.store_name}</td><td>${num(s.orders)}</td><td>${num(s.diners)}</td><td>${money(s.net_revenue)}</td></tr>`).join("")}</tbody></table>`)}
function showAlert(key){const item=DATA.alerts[key];const labels={return_rate:"退菜预警",discount_dependency:"高折扣依赖",revenue_decline:"营收下跌"};openDrawer(labels[key],"预警规则尚未配置",`<div class="notice"><div class="notice-title">当前状态：未启用</div><p>${item.reason}。原型不会生成模拟预警；补齐字段或阈值后，预警数量、地图标记和门店清单将同时启用。</p></div>`)}
function showQuality(){const q=DATA.quality.business,s=DATA.quality.sales;openDrawer("数据质量","本次原型清洗结果",`<div class="notice"><div class="notice-title">营业数据</div><p>源数据 ${num(q.source_rows)} 行，清洗后 ${num(q.clean_rows)} 行；删除合计或无效记录 ${num(q.removed_invalid_or_summary_rows)} 行；金额勾稽异常 ${num(q.reconciliation_exceptions)} 行。</p></div><div class="notice"><div class="notice-title">菜品数据</div><p>清洗后 ${num(s.clean_rows)} 行。营业日期：${s.has_business_date?"已具备":"缺失"}；菜品大类：${s.has_dish_category?"已具备":"缺失"}；退菜数量：${s.has_return_quantity?"已具备":"缺失"}。</p></div><div class="notice"><div class="notice-title">门店坐标</div><p>${DATA.coordinate_status.reason}，共 ${DATA.coordinate_status.missing_store_count} 家门店待补。</p></div>`)}
async function init(){try{DATA=await fetch("data/dashboard-data.json").then(r=>{if(!r.ok)throw new Error("数据文件加载失败");return r.json()});mapChart=echarts.init(document.getElementById("map"));trendChart=echarts.init(document.getElementById("trendChart"));regionChart=echarts.init(document.getElementById("regionChart"));renderKPIs();renderRank();renderTrend();renderRegions();await renderNational();document.getElementById("loading").classList.add("hidden")}catch(e){document.getElementById("loadingText").innerHTML=`<span class="error">${e.message}</span><br>请通过本地服务打开页面`}}
document.getElementById("backBtn").onclick=renderNational;document.getElementById("drawerClose").onclick=closeDrawer;document.getElementById("drawerMask").onclick=closeDrawer;document.getElementById("dataStatus").onclick=showQuality;document.querySelectorAll(".alert-chip").forEach(b=>b.onclick=()=>showAlert(b.dataset.alert));window.addEventListener("resize",()=>{mapChart?.resize();trendChart?.resize();regionChart?.resize()});init();
</script>
</body>
</html>
