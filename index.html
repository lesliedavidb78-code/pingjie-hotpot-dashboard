<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>萍姐火锅全国经营地图看板</title>
  <script src="assets/vendor/echarts.min.js"></script>
  <style>
    :root{
      --bg:#05101f;--bg-soft:#071a2e;--panel:#123448;--panel-2:#143c50;
      --line:rgba(120,200,220,.32);--line-soft:rgba(100,180,200,.18);--ink:#e8f0ff;--muted:#87acc4;
      --gold:#4fc6e8;--gold-bright:#7fe9d0;--gold-dark:#0c8f86;--red:#ff4d63;
      --red-soft:#571625;--radius:10px;
    }
    *{box-sizing:border-box}html,body{height:100%;margin:0}body{overflow:hidden;background:var(--bg);color:var(--ink);font-family:"Microsoft YaHei","PingFang SC",sans-serif}
    button{font:inherit}.app{height:100vh;display:flex;flex-direction:column;background:radial-gradient(1200px 800px at 20% -10%,rgba(28,78,110,.55),transparent 60%),radial-gradient(1000px 700px at 100% 110%,rgba(20,90,80,.45),transparent 55%),linear-gradient(160deg,#05101f 0%,#071a2e 55%,#04111e 100%)}
    .topbar{height:76px;flex:0 0 auto;display:flex;align-items:center;padding:0 22px;border-bottom:1px solid rgba(120,200,220,.18);background:rgba(5,16,31,.82);gap:24px}
    .brand{display:flex;align-items:center;gap:12px;min-width:360px}.seal{width:40px;height:40px;border:1px solid var(--gold);display:grid;place-items:center;color:var(--gold-bright);font-family:"STKaiti","KaiTi",serif;font-size:23px;transform:rotate(-2deg);box-shadow:inset 0 0 0 3px var(--bg),inset 0 0 0 4px rgba(212,167,77,.35)}
    .brand h1{margin:0;font-family:"Songti SC","SimSun",serif;font-size:20px;letter-spacing:2px;font-weight:800;background:linear-gradient(90deg,#7fe9d0,#4fc6e8);-webkit-background-clip:text;background-clip:text;color:transparent}.brand p{margin:4px 0 0;color:#7fa6c0;font:10px/1.2 "Bahnschrift",sans-serif;letter-spacing:1.8px}
    .top-meta{display:flex;align-items:center;gap:10px;margin-left:auto}.meta-block{border-left:1px solid var(--line);padding-left:12px}.meta-label{font-size:10px;color:var(--muted);letter-spacing:1px}.meta-value{font:600 13px/1.6 "Bahnschrift","Microsoft YaHei";color:var(--gold-bright)}
    .alert-chip,.data-chip{height:36px;padding:0 11px;border-radius:7px;cursor:pointer;font-size:10px;transition:transform .16s ease,filter .16s ease}.alert-chip{border:1px solid #ff6b7d;background:linear-gradient(135deg,#7a1224,#b81d3a);color:#fff;box-shadow:0 0 14px rgba(255,77,99,.28)}.alert-chip b{color:#fff;font-weight:800;margin-left:4px}.alert-chip.rise{border-color:#ffbd59;background:linear-gradient(135deg,#72420a,#b66a0d);box-shadow:0 0 14px rgba(255,174,66,.25)}.alert-chip.normal{border-color:#38c9b0;background:rgba(12,100,92,.58);box-shadow:none}.alert-chip.unavailable{background:rgba(122,18,36,.48);border-color:rgba(255,107,125,.72);color:#ffd0d6;box-shadow:none}.alert-chip:hover{filter:brightness(1.15);transform:translateY(-1px)}.data-chip{border:1px solid rgba(120,200,220,.4);background:rgba(20,60,80,.5);color:#cdeefb}.data-chip:hover{border-color:#6fe0d6;background:rgba(40,110,140,.7)}
    .dashboard{flex:1;min-height:0;display:grid;grid-template-columns:248px minmax(500px,1fr) 270px;grid-template-rows:1fr 1fr;grid-template-areas:"leftTop map rightTop" "leftBottom map rightBottom";gap:12px;padding:12px}
    .panel{min-height:0;min-width:0;background:linear-gradient(180deg,rgba(18,52,72,.65),rgba(10,30,48,.50));border:1px solid rgba(100,180,200,.18);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.22);overflow:hidden}
    .panel-head{height:43px;display:flex;align-items:center;justify-content:space-between;padding:0 13px;border-bottom:1px solid var(--line-soft)}.panel-title{font-size:12px;font-weight:600;letter-spacing:.5px}.panel-note{font-size:10px;color:var(--muted)}.panel-action{border:0;background:transparent;color:#7fe9d0;font-size:10px;cursor:pointer;padding:5px}.panel-action:hover{text-decoration:underline}
    .left-top{grid-area:leftTop;padding:13px}.left-bottom{grid-area:leftBottom}.right-top{grid-area:rightTop}.right-bottom{grid-area:rightBottom}.map-panel{grid-area:map;position:relative;display:flex;flex-direction:column}
    .eyebrow{font:10px/1 "Bahnschrift",sans-serif;color:var(--gold);letter-spacing:1.6px;margin-bottom:12px}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}.kpi{min-height:84px;border:1px solid var(--line-soft);background:rgba(255,255,255,.015);padding:12px;border-radius:8px;position:relative;cursor:pointer;transition:border-color .16s ease,transform .16s ease}.kpi:hover{border-color:#6fe0d6;transform:translateY(-1px)}.kpi.wide{grid-column:1/-1;min-height:92px;background:linear-gradient(100deg,rgba(80,210,190,.10),transparent)}
    .kpi-label{font-size:10px;color:#87acc4}.kpi-value{margin-top:8px;font:700 22px/1 "Bahnschrift","Microsoft YaHei";color:#eafff9}.kpi.wide .kpi-value{font-size:29px;color:#7fe9d0}.kpi-unit{font-size:10px;color:#8fb6cd;margin-left:4px}
    .rank-list{height:calc(100% - 43px);overflow:auto;padding:5px 10px 10px}.rank-row{display:grid;grid-template-columns:22px 1fr auto;gap:7px;align-items:center;padding:8px 2px;border-bottom:1px solid var(--line-soft);cursor:pointer}.rank-row:hover{background:rgba(80,210,190,.08)}.rank-no{font:700 11px "Bahnschrift";color:var(--muted)}.rank-row:nth-child(-n+3) .rank-no{color:var(--gold-bright)}.rank-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rank-sub{font-size:9px;color:var(--muted);margin-top:2px}.rank-value{font:600 11px "Bahnschrift";color:var(--gold-bright)}
    .chart{height:calc(100% - 43px);width:100%}.map-toolbar{height:48px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--line-soft);z-index:3}.crumb{font-size:11px;color:var(--muted);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.crumb b{color:var(--ink)}.map-actions{margin-left:auto;display:flex;gap:7px}.mode-btn,.back-btn{height:28px;border:1px solid var(--line);border-radius:6px;background:var(--panel-2);color:var(--muted);padding:0 9px;font-size:10px;cursor:pointer}.mode-btn.active{border-color:var(--gold);color:var(--gold-bright)}.mode-btn:disabled{opacity:.42;cursor:not-allowed}.back-btn{display:none;color:var(--ink)}
    #map{flex:1;min-height:0;background:radial-gradient(900px 600px at 50% 40%,rgba(10,40,60,.35),transparent 70%)}.map-caption{position:absolute;left:14px;bottom:12px;z-index:3;background:rgba(8,24,40,.72);border:1px solid rgba(120,200,220,.2);border-radius:7px;padding:8px 10px;font-size:9px;color:#bcd8e8;backdrop-filter:blur(8px)}.map-caption b{color:#7fe9d0}
    .drawer-mask{position:fixed;inset:0;background:rgba(0,0,0,.44);z-index:20;display:none}.drawer-mask.show{display:block}.drawer{position:fixed;right:-780px;top:0;bottom:0;width:min(760px,92vw);z-index:21;background:#0f1b27;border-left:1px solid var(--line);box-shadow:-18px 0 45px rgba(0,0,0,.45);transition:right .24s ease;display:flex;flex-direction:column}.drawer.show{right:0}.drawer-head{height:70px;padding:0 18px;display:flex;align-items:center;border-bottom:1px solid var(--line)}.drawer-title{font:700 16px "Songti SC","SimSun",serif}.drawer-sub{font-size:10px;color:var(--muted);margin-top:4px}.drawer-close{margin-left:auto;width:32px;height:32px;border:1px solid var(--line);background:transparent;color:var(--ink);border-radius:7px;cursor:pointer}.drawer-body{padding:14px;overflow:auto}.notice{padding:12px;border:1px solid var(--line);border-radius:8px;background:var(--panel);margin-bottom:10px}.notice.alert-notice{border-color:#ff6b7d;background:linear-gradient(135deg,rgba(122,18,36,.68),rgba(87,22,37,.55))}.notice-title{font-size:11px;color:var(--gold-bright);font-weight:600}.alert-notice .notice-title{color:#fff}.notice p{margin:6px 0 0;font-size:10px;line-height:1.7;color:var(--muted)}.alert-notice p{color:#ffd0d6}.store-table{width:100%;border-collapse:collapse;font-size:10px}.store-table th,.store-table td{padding:9px 6px;text-align:left;border-bottom:1px solid var(--line-soft)}.store-table th{color:var(--muted);font-weight:500;position:sticky;top:0;background:#0f1b27}.store-table td:last-child{text-align:right;color:var(--gold-bright)}.store-table tbody tr[data-store]{cursor:pointer}.store-table tbody tr[data-store]:hover{background:rgba(80,210,190,.08)}
    .drawer-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.drawer-tools input,.drawer-tools select{height:34px;border:1px solid var(--line);border-radius:7px;background:#10283a;color:var(--ink);padding:0 10px;font-size:11px}.drawer-tools input{min-width:210px;flex:1}.drawer-tools select{min-width:120px}.trend-tabs{display:flex;gap:8px;margin-bottom:10px}.trend-tab{height:32px;padding:0 14px;border:1px solid var(--line);border-radius:7px;background:rgba(20,60,80,.5);color:#bcd8e8;cursor:pointer}.trend-tab.active{border-color:#6fe0d6;background:#0c8f86;color:#fff}.drawer-chart{height:340px;border:1px solid var(--line-soft);border-radius:9px;background:rgba(8,24,40,.35)}
    .city-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.city-metric{padding:10px;border:1px solid var(--line);border-radius:8px}.city-metric span{display:block;font-size:9px;color:var(--muted)}.city-metric b{display:block;margin-top:6px;font:600 14px "Bahnschrift";color:var(--ink)}
    .loading{position:fixed;inset:0;z-index:50;background:var(--bg);display:grid;place-items:center}.loading.hidden{display:none}.loader{text-align:center;color:var(--muted);font-size:11px}.loader-ring{width:34px;height:34px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .85s linear infinite;margin:0 auto 12px}@keyframes spin{to{transform:rotate(360deg)}}
    .error{color:#f0b0a7}.empty-chart{height:calc(100% - 43px);display:grid;place-items:center;text-align:center;padding:20px;color:var(--muted);font-size:11px;line-height:1.8}
    @media(max-width:1100px){body{overflow:auto}.app{height:auto;min-height:100vh}.topbar{height:auto;min-height:76px;flex-wrap:wrap;padding:12px}.brand{min-width:0}.top-meta{width:100%;margin-left:0;overflow:auto}.dashboard{display:flex;flex-direction:column;padding:10px}.left-top{order:1}.map-panel{order:2;height:520px}.right-top{order:3;height:260px}.right-bottom{order:4;height:300px}.left-bottom{order:5;height:380px}.drawer{width:min(92vw,420px)}.kpis{grid-template-columns:repeat(2,1fr)}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="loading" id="loading"><div class="loader"><div class="loader-ring"></div><div id="loadingText">正在整理全国经营数据…</div></div></div>
<div class="app">
  <header class="topbar">
    <div class="brand"><div class="seal">萍</div><div><h1>萍姐火锅全国经营地图看板</h1><p>NATIONAL OPERATIONS ATLAS</p></div></div>
    <div class="top-meta">
      <div class="meta-block"><div class="meta-label">数据截止日</div><div class="meta-value" id="dataDate">—</div></div>
      <button class="alert-chip rise" data-alert="revenue_rise">营业额上涨 <b>—</b></button>
      <button class="alert-chip" data-alert="discount_dependency">高折扣依赖 <b>—</b></button>
      <button class="alert-chip" data-alert="revenue_decline">营业额下跌 <b>—</b></button>
      <button class="alert-chip" data-alert="market_decline">大盘下跌 <b>—</b></button>
      <button class="data-chip" id="dataStatus">数据质量</button>
    </div>
  </header>
  <main class="dashboard">
    <section class="panel left-top">
      <div class="eyebrow">全国经营概览</div>
      <div class="kpis">
        <div class="kpi wide" id="revenueKpi"><div class="kpi-label">全国昨日总营收 · 点击查看趋势</div><div class="kpi-value" id="kpiRevenue">—</div></div>
        <div class="kpi" id="storesKpi"><div class="kpi-label">全国门店 · 点击查看全部</div><div class="kpi-value" id="kpiStores">—</div></div>
        <div class="kpi" id="dinersKpi"><div class="kpi-label">全国总客流 · 点击查看门店</div><div class="kpi-value" id="kpiDiners">—</div></div>
      </div>
    </section>
    <section class="panel left-bottom"><div class="panel-head"><div class="panel-title">昨日营收 TOP10</div><button class="panel-action" id="allStoresBtn">全部门店 →</button></div><div class="rank-list" id="rankList"></div></section>
    <section class="panel map-panel">
      <div class="map-toolbar"><div class="crumb" id="crumb"><b>全国</b></div><div class="map-actions"><button class="back-btn" id="backBtn">返回全国</button><button class="mode-btn active">省级热力</button><button class="mode-btn" id="pointMode" disabled title="源表未提供门店坐标">门店圆点 · 待坐标</button></div></div>
      <div id="map"></div><div class="map-caption" id="mapCaption"><b>蓝绿深浅</b> = 昨日营业额　·　悬浮省份查看门店数　·　点击下钻城市</div>
    </section>
    <section class="panel right-top"><div class="panel-head"><div class="panel-title">近 7 日全国营收</div><button class="panel-action" id="trendExpandBtn">本月 / 本年 →</button></div><div id="trendChart" class="chart"></div></section>
    <section class="panel right-bottom"><div class="panel-head"><div class="panel-title">七大地理分区营收占比</div><div class="panel-note">点击区域下钻</div></div><div id="regionChart" class="chart"></div></section>
  </main>
</div>
<div class="drawer-mask" id="drawerMask"></div><aside class="drawer" id="drawer"><div class="drawer-head"><div><div class="drawer-title" id="drawerTitle">详情</div><div class="drawer-sub" id="drawerSub"></div></div><button class="drawer-close" id="drawerClose">×</button></div><div class="drawer-body" id="drawerBody"></div></aside>
<script>
const AD_CODES={"北京市":"110000","天津市":"120000","河北省":"130000","山西省":"140000","内蒙古自治区":"150000","辽宁省":"210000","吉林省":"220000","黑龙江省":"230000","上海市":"310000","江苏省":"320000","浙江省":"330000","安徽省":"340000","福建省":"350000","江西省":"360000","山东省":"370000","河南省":"410000","湖北省":"420000","湖南省":"430000","广东省":"440000","广西壮族自治区":"450000","海南省":"460000","重庆市":"500000","四川省":"510000","贵州省":"520000","云南省":"530000","陕西省":"610000","甘肃省":"620000","宁夏回族自治区":"640000","新疆维吾尔自治区":"650000"};
const GOLD_SCALE=["#bdf3e2","#74d8bf","#2bb39b","#0c8f86","#045f57"];let DATA,STORE_HISTORY,mapChart,trendChart,regionChart,drawerTrendChart,currentProvince=null;
const money=v=>new Intl.NumberFormat("zh-CN",{style:"currency",currency:"CNY",maximumFractionDigits:0}).format(v||0);const num=v=>new Intl.NumberFormat("zh-CN").format(v||0);const pct=v=>v==null?"暂无数据":(v*100).toFixed(1)+"%";
function openDrawer(title,sub,html){if(drawerTrendChart){drawerTrendChart.dispose();drawerTrendChart=null}document.getElementById("drawerTitle").textContent=title;document.getElementById("drawerSub").textContent=sub||"";document.getElementById("drawerBody").innerHTML=html;document.getElementById("drawer").classList.add("show");document.getElementById("drawerMask").classList.add("show")}
function closeDrawer(){if(drawerTrendChart){drawerTrendChart.dispose();drawerTrendChart=null}document.getElementById("drawer").classList.remove("show");document.getElementById("drawerMask").classList.remove("show")}
function renderKPIs(){document.getElementById("dataDate").textContent=DATA.meta.data_date;document.getElementById("kpiRevenue").innerHTML=money(DATA.nation.net_revenue);document.getElementById("kpiStores").innerHTML=num(DATA.nation.store_count)+'<span class="kpi-unit">家</span>';document.getElementById("kpiDiners").innerHTML=num(DATA.nation.diners)+'<span class="kpi-unit">人</span>'}
function renderAlertChips(){document.querySelectorAll(".alert-chip").forEach(button=>{const key=button.dataset.alert,item=DATA.alerts[key],value=button.querySelector("b");button.classList.toggle("unavailable",!item?.enabled);if(key==="market_decline"){button.classList.toggle("normal",!item.triggered);value.textContent=item.triggered?"预警":pct(item.market_change);button.title=`${item.rule}；当前同期变化 ${pct(item.market_change)}`;return}value.textContent=item.enabled?`${num(item.store_count)}店`:"缺字段";button.title=item.enabled?`${item.rule}；涉及 ${item.province_count} 个省级区域、${item.store_count} 家门店`:item.reason})}
const isDiscountAlert=row=>DATA.alerts.discount_dependency.enabled&&(row.discount_ratio??0)>=DATA.alerts.discount_dependency.threshold;
const isRiseAlert=row=>DATA.alerts.revenue_rise.enabled&&row.gross_same_week_change!=null&&row.gross_same_week_change>DATA.alerts.revenue_rise.threshold;
const isDeclineAlert=row=>DATA.alerts.revenue_decline.enabled&&row.gross_same_week_change!=null&&row.gross_same_week_change<DATA.alerts.revenue_decline.threshold;
function mapDatum(row){const discount=isDiscountAlert(row),rise=isRiseAlert(row),decline=isDeclineAlert(row);return{...row,value:row.gross_revenue,itemStyle:decline?{borderColor:"#ff6b7d",borderWidth:2.2,shadowBlur:10,shadowColor:"rgba(255,77,99,.70)"}:rise?{borderColor:"#ffbd59",borderWidth:2,shadowBlur:8,shadowColor:"rgba(255,189,89,.55)"}:undefined,label:discount?{show:true,formatter:"高折扣",color:"#fff",fontSize:8,fontWeight:700,backgroundColor:"#7a1224",padding:[2,4],borderRadius:3}:undefined}}
function renderRank(){document.getElementById("rankList").innerHTML=DATA.top10.map((s,i)=>`<div class="rank-row" onclick="showStore('${s.merchant_id}')"><div class="rank-no">${String(i+1).padStart(2,"0")}</div><div><div class="rank-name">${s.store_name}</div><div class="rank-sub">${s.province} · ${s.city}</div></div><div class="rank-value">${money(s.net_revenue)}</div></div>`).join("")}
function renderTrend(){trendChart.setOption({animationDuration:700,grid:{left:50,right:16,top:24,bottom:32},tooltip:{trigger:"axis",backgroundColor:"#fff",borderColor:"#74d8bf",textStyle:{color:"#0f172a"},valueFormatter:money},xAxis:{type:"category",data:DATA.trend.map(d=>d.date.slice(5)),boundaryGap:false,axisLine:{lineStyle:{color:"rgba(120,200,220,.35)"}},axisTick:{show:false},axisLabel:{color:"#87acc4",fontSize:10}},yAxis:{type:"value",splitLine:{lineStyle:{color:"rgba(100,180,200,.12)"}},axisLabel:{color:"#87acc4",fontSize:9,formatter:v=>v>=10000?(v/10000).toFixed(0)+"万":v}},series:[{type:"line",data:DATA.trend.map(d=>d.net_revenue),smooth:.35,symbol:"circle",symbolSize:5,lineStyle:{color:"#5fe0c8",width:2},itemStyle:{color:"#bdf3e2"},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:"rgba(80,210,190,.28)"},{offset:1,color:"rgba(80,210,190,0)"}])}}]})}

async function showStoreDay(merchantId,date){const id=String(merchantId),s=DATA.stores.find(item=>item.merchant_id===id);if(!s)return;const rows=await loadStoreHistory(id),r=rows.find(item=>item.date===date);if(!r)return;const previousDate=new Date(date+"T00:00:00");previousDate.setDate(previousDate.getDate()-7);const compareDate=previousDate.toISOString().slice(0,10),previous=rows.find(item=>item.date===compareDate),change=previous?safeDayChange(r.gross_revenue,previous.gross_revenue):null,dayStatus=change!=null&&change>.2?"上涨超过20%":change!=null&&change<-.2?"下跌超过20%":"未触发涨跌预警";openDrawer(`${s.store_name} · ${date}`,`${s.province} · ${s.city}`,`<button class="trend-tab active" onclick="showStore('${id}')" style="margin-bottom:12px">← 返回该门店全部营业数据</button><div class="city-summary"><div class="city-metric"><span>当日营业额</span><b>${money(r.gross_revenue)}</b></div><div class="city-metric"><span>优惠金额</span><b>${money(r.discount_amount)}</b></div><div class="city-metric"><span>营业收入</span><b>${money(r.net_revenue)}</b></div><div class="city-metric"><span>订单量</span><b>${num(r.orders)} 单</b></div><div class="city-metric"><span>用餐人数</span><b>${num(r.diners)} 人</b></div><div class="city-metric"><span>消费桌数</span><b>${num(r.tables)} 桌</b></div><div class="city-metric"><span>客单价</span><b>${money(r.spend_per_guest)}</b></div><div class="city-metric"><span>单均消费</span><b>${money(r.spend_per_order)}</b></div><div class="city-metric"><span>上座率</span><b>${pct(r.seating_rate)}</b></div><div class="city-metric"><span>开台率</span><b>${pct(r.table_open_rate)}</b></div><div class="city-metric"><span>翻台率</span><b>${pct(r.table_turnover_rate)}</b></div></div><div class="notice ${dayStatus.includes("超过")?"alert-notice":""}"><div class="notice-title">${dayStatus}</div><p>${previous?`${date} 对比上周同日 ${compareDate}，营业额变化 ${pct(change)}。`:"缺少上周同日可比记录，未计算涨跌。"} 当前源表粒度为“门店—营业日”，因此详情展示到当日汇总指标，无法继续拆分到具体订单。</p></div>`)}
function safeDayChange(current,previous){return previous?(current-previous)/previous:null}
function showAlert(key){const item=DATA.alerts[key],labels={discount_dependency:"高折扣依赖",revenue_rise:"营业额上涨",revenue_decline:"营业额下跌",market_decline:"全国大盘下跌"};if(key==="market_decline"){openDrawer(labels[key],`${DATA.meta.data_date} 对比 ${item.comparison_date}`,`<div class="notice ${item.triggered?"alert-notice":""}"><div class="notice-title">${item.triggered?"已触发大盘下跌预警":"当前大盘正常"}</div><p>全国营业额同期变化 ${pct(item.market_change)}。当本日较上周同日下跌超过10%时，单独触发大盘预警。</p></div>`);return}const isDiscount=key==="discount_dependency",isRise=key==="revenue_rise",predicate=isDiscount?isDiscountAlert:isRise?isRiseAlert:isDeclineAlert,provinces=DATA.provinces.filter(predicate).sort((a,b)=>isDiscount?b.discount_ratio-a.discount_ratio:isRise?b.gross_same_week_change-a.gross_same_week_change:a.gross_same_week_change-b.gross_same_week_change),stores=DATA.stores.filter(predicate).sort((a,b)=>isDiscount?b.discount_ratio-a.discount_ratio:isRise?b.gross_same_week_change-a.gross_same_week_change:a.gross_same_week_change-b.gross_same_week_change);if(isDiscount){openDrawer(labels[key],item.rule,`<div class="notice alert-notice"><div class="notice-title">${num(stores.length)} 家门店</div><p>优惠金额占营业额达到20%即预警。</p></div><table class="store-table"><thead><tr><th>区域 / 门店</th><th>所在地</th><th>优惠占比</th></tr></thead><tbody>${provinces.map(p=>`<tr><td><b>${p.name}</b></td><td>省级汇总</td><td>${pct(p.discount_ratio)}</td></tr>`).join("")}${stores.map(s=>`<tr data-store onclick="showStore('${s.merchant_id}')"><td>${s.store_name}</td><td>${s.province} · ${s.city}</td><td>${pct(s.discount_ratio)}</td></tr>`).join("")}</tbody></table>`);return}openDrawer(labels[key],`${DATA.meta.data_date} 对比 ${item.comparison_date}`,`<div class="notice alert-notice"><div class="notice-title">${num(stores.length)} 家门店 · ${num(provinces.length)} 个省级区域</div><p>${item.rule}。比较口径固定为本日对比上周同日，不再与全国大盘差额比较。</p></div><table class="store-table"><thead><tr><th>区域 / 门店</th><th>所在地</th><th>营业额同期变化</th></tr></thead><tbody>${provinces.map(p=>`<tr><td><b>${p.name}</b></td><td>省级汇总</td><td>${pct(p.gross_same_week_change)}</td></tr>`).join("")}${stores.map(s=>`<tr data-store onclick="showStore('${s.merchant_id}')"><td>${s.store_name}</td><td>${s.province} · ${s.city}</td><td>${pct(s.gross_same_week_change)}</td></tr>`).join("")}</tbody></table>`)}
function showQuality(){const q=DATA.quality.business;openDrawer("数据质量","仅使用门店营业数据表",`<div class="notice"><div class="notice-title">营业数据</div><p>源数据 ${num(q.source_rows)} 行，清洗后 ${num(q.clean_rows)} 行；删除合计或无效记录 ${num(q.removed_invalid_or_summary_rows)} 行；门店—营业日重复 ${num(q.duplicate_business_date_merchant_rows)} 行；金额勾稽异常 ${num(q.reconciliation_exceptions)} 行。</p></div><div class="notice"><div class="notice-title">历史范围</div><p>${DATA.meta.start_date} 至 ${DATA.meta.data_date}。菜品销售表已停用，后续更新只需提供门店营业数据表。</p></div><div class="notice"><div class="notice-title">门店坐标</div><p>${DATA.coordinate_status.reason}，共 ${DATA.coordinate_status.missing_store_count} 家门店待补。</p></div>`)}
async function init(){try{DATA=await fetch("data/dashboard-data.json").then(r=>{if(!r.ok)throw new Error("数据文件加载失败");return r.json()});mapChart=echarts.init(document.getElementById("map"));trendChart=echarts.init(document.getElementById("trendChart"));regionChart=echarts.init(document.getElementById("regionChart"));renderKPIs();renderAlertChips();renderRank();renderTrend();renderRegions();trendChart.on("click",()=>showTrendExplorer("month"));regionChart.on("click",p=>showRegion(p.name));await renderNational();document.getElementById("loading").classList.add("hidden")}catch(e){document.getElementById("loadingText").innerHTML=`<span class="error">${e.message}</span><br>请通过本地服务打开页面`}}
document.getElementById("backBtn").onclick=renderNational;document.getElementById("drawerClose").onclick=closeDrawer;document.getElementById("drawerMask").onclick=closeDrawer;document.getElementById("dataStatus").onclick=showQuality;document.getElementById("allStoresBtn").onclick=showAllStores;document.getElementById("storesKpi").onclick=showAllStores;document.getElementById("dinersKpi").onclick=showAllStores;document.getElementById("revenueKpi").onclick=()=>showTrendExplorer("month");document.getElementById("trendExpandBtn").onclick=()=>showTrendExplorer("month");document.querySelectorAll(".alert-chip").forEach(b=>b.onclick=()=>showAlert(b.dataset.alert));window.addEventListener("resize",()=>{mapChart?.resize();trendChart?.resize();regionChart?.resize();drawerTrendChart?.resize()});init();
</script>
